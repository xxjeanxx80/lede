name: Build Firmware RAX3000Q Final

on:
  workflow_dispatch: # Chạy thủ công từ tab Actions

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt môi trường build
      run: |
        sudo apt update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgpgme11-dev libltdl-dev \
        libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
        mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip libpython3-dev \
        qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
        xmlto xxd zlib1g-dev

    - name: Cập nhật Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Nạp file cấu hình (.config)
      run: |
        # Đảm bảo bạn đã tạo file rax3000q.config ở thư mục gốc của Repo
        if [ -f rax3000q.config ]; then
          cp rax3000q.config .config
          echo "Đã nạp file cấu hình thành công."
        else
          echo "LỖI: Không tìm thấy file rax3000q.config trong Repo!"
          exit 1
        fi
        make defconfig

    - name: Tải gói chuẩn bị biên dịch
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Biên dịch Firmware (Nấu)
      run: |
        echo -e "$(nproc) thread compile"
        # Thử build nhanh bằng nhiều luồng, nếu lỗi thì build chậm để kiểm tra lỗi chi tiết
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Gom nhóm sản phẩm
      run: |
        mkdir -p ./output
        cp bin/targets/qualcomm/ipq50xx/*.bin ./output/ 2>/dev/null || cp bin/targets/qualcomm/ipq50xx/*.ubi ./output/ 2>/dev/null
        echo "Sản phẩm đã được gom vào thư mục output."

    - name: Tải lên sản phẩm (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Firmware_RAX3000Q
        path: ./output/*
