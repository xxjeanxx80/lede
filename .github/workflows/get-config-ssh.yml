name: Get Config RAX3000Q (ImmortalWrt)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Bật SSH qua tmate'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt môi trường
      run: |
        sudo apt update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgpgme11-dev libltdl-dev \
        libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
        mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip libpython3-dev \
        qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
        xmlto xxd zlib1g-dev

    - name: Tải mã nguồn ImmortalWrt (Hỗ trợ RAX3000Q tốt nhất)
      run: |
        # Chuyển sang ImmortalWrt vì LEDE hiện thiếu thư mục ipq50xx
        git clone --depth 1 https://github.com/immortalwrt/immortalwrt
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        echo "--- KIỂM TRA LẠI THƯ MỤC TARGET ---"
        if [ -d "target/linux/ipq50xx" ]; then
          echo "Đã tìm thấy thư mục ipq50xx. Bạn sẽ thấy RAX3000Q trong menuconfig!"
        else
          echo "Cảnh báo: Vẫn không tìm thấy. Hệ thống sẽ quét sâu hơn..."
        fi

    - name: Mở kết nối SSH (tmate)
      uses: mxschmitt/action-tmate@v3
      if: github.event.inputs.ssh == 'true'

    - name: Kết thúc
      run: echo "Xong."
